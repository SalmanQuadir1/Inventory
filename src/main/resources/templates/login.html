<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FGH - Secure Authentication</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #f8fafc;
        }

        .glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .hero-gradient {
            background: radial-gradient(circle at top right, rgba(99, 102, 241, 0.08) 0%, transparent 50%), radial-gradient(circle at bottom left, rgba(6, 182, 212, 0.08) 0%, transparent 50%);
        }
    </style>
</head>

<body class="hero-gradient flex items-center justify-center min-h-screen px-6 py-12 overflow-hidden">
    <!-- Animated background elements -->
    <div class="absolute top-0 left-0 w-full h-full z-0 pointer-events-none">
        <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-indigo-400/10 rounded-full blur-3xl animate-pulse"></div>
        <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-cyan-400/10 rounded-full blur-3xl animate-pulse"
            style="animation-delay: 2s"></div>
    </div>

    <div class="w-full max-w-md relative z-10">
        <!-- Logo/Brand -->
        <div class="flex flex-col items-center mb-10">
            <div
                class="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-2xl shadow-indigo-200 mb-4 rotate-3 transform">
                <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 9l9-6 9 6v12a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 22V12h6v10"></path>
                </svg>
            </div>
            <h1 class="text-3xl font-black text-gray-900 tracking-tight">Welcome Back</h1>
            <p class="text-gray-500 font-medium text-sm mt-1">Access your Store gateway</p>
        </div>

        <div class="glass rounded-[2rem] shadow-2xl shadow-gray-200/50 p-10">
            <div th:if="${param.error}"
                class="mb-8 p-4 bg-rose-50 border border-rose-100 rounded-2xl flex items-center text-rose-700 animate-bounce">
                <svg class="w-5 h-5 mr-3 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd"
                        d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"
                        clip-rule="evenodd"></path>
                </svg>
                <p class="text-xs font-bold leading-tight uppercase tracking-wider">Invalid Authentication Details</p>
            </div>

            <div th:if="${param.logout}"
                class="mb-8 p-4 bg-emerald-50 border border-emerald-100 rounded-2xl flex items-center text-emerald-700">
                <svg class="w-5 h-5 mr-3 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd"
                        d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
                        clip-rule="evenodd"></path>
                </svg>
                <p class="text-xs font-bold leading-tight uppercase tracking-wider">Session safely ended</p>
            </div>

            <form th:action="@{/login}" method="post" class="space-y-6">
                <div class="space-y-1.5 focus-within:scale-[1.02] transition-transform duration-200">
                    <label for="username"
                        class="text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] ml-1">Username
                        Identification</label>
                    <div class="relative">
                        <input type="text" id="username" name="username" required
                            class="block w-full px-5 py-4 bg-white/50 border border-gray-200 rounded-2xl text-sm font-semibold placeholder-gray-400 focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all outline-none"
                            placeholder="Enter your username">
                        <div class="absolute right-5 top-1/2 -translate-y-1/2 text-gray-300">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                            </svg>
                        </div>
                    </div>
                </div>

                <div class="space-y-1.5 focus-within:scale-[1.02] transition-transform duration-200">
                    <label for="password"
                        class="text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] ml-1">Secure
                        Passkey</label>
                    <div class="relative">
                        <input type="password" id="password" name="password" required
                            class="block w-full px-5 py-4 bg-white/50 border border-gray-200 rounded-2xl text-sm font-semibold placeholder-gray-400 focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all outline-none"
                            placeholder="••••••••">
                        <div class="absolute right-5 top-1/2 -translate-y-1/2 text-gray-300 pointer-events-none">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                                </path>
                            </svg>
                        </div>
                    </div>
                </div>

                <div class="pt-4">
                    <button type="submit"
                        class="w-full flex justify-center py-4 bg-indigo-600 text-white rounded-2xl text-sm font-black shadow-xl shadow-indigo-100 hover:bg-indigo-700 hover:shadow-indigo-200 hover:-translate-y-1 active:scale-95 transition-all duration-200 uppercase tracking-[0.15em]">
                        Establish Secure Session
                    </button>
                </div>
            </form>
        </div>

        <!-- Utility Links -->
        <div class="mt-8 flex justify-center space-x-6">
            <a th:href="@{/}"
                class="text-xs font-bold text-gray-400 hover:text-indigo-600 transition-colors uppercase tracking-widest flex items-center">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Return to Landing
            </a>
            <span class="w-1 h-1 bg-gray-300 rounded-full my-auto"></span>
            <a href="#"
                class="text-xs font-bold text-gray-400 hover:text-indigo-600 transition-colors uppercase tracking-widest">Help
                Center</a>
        </div>
    </div>
</body>

</html>
