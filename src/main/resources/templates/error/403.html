<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout :: layout(pageTitle='Access Denied', content=~{this :: #main-content})}">

<body>
    <div id="main-content" class="flex flex-col items-center justify-center min-h-[60vh] text-center px-4">
        <div
            class="bg-white p-12 rounded-[3rem] shadow-2xl shadow-rose-100 border border-slate-100 max-w-lg w-full transform transition hover:scale-[1.02]">
            <div
                class="mb-8 inline-flex items-center justify-center w-28 h-28 rounded-[2rem] bg-rose-50 text-rose-600 animate-pulse">
                <svg class="w-14 h-14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                        d="M12 15v2m0-8v6m-5 2h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                </svg>
            </div>
            <h1 class="text-4xl font-black text-slate-900 mb-4 tracking-tighter">Access Restricted</h1>
            <p class="text-slate-500 mb-10 font-medium leading-relaxed">Security clearance insufficient. Your current
                operator role does not possess the required authorization for this restricted interface.</p>

            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <a th:href="@{/dashboard}"
                    class="px-10 py-4 bg-rose-600 text-white font-black rounded-2xl shadow-xl shadow-rose-100 hover:bg-rose-700 transition-all uppercase tracking-widest text-[10px]">
                    Public Access Hub
                </a>
                <button onclick="window.history.back()"
                    class="px-10 py-4 bg-slate-50 text-slate-600 font-black rounded-2xl hover:bg-slate-100 transition-all uppercase tracking-widest text-[10px]">
                    Preceding Phase
                </button>
            </div>
        </div>
    </div>
</body>

</html>
