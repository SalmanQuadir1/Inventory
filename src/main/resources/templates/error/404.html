<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout :: layout(pageTitle='Page Not Found', content=~{this :: #main-content})}">

<body>
    <div id="main-content" class="flex flex-col items-center justify-center min-h-[60vh] text-center px-4">
        <div
            class="bg-white p-12 rounded-[3rem] shadow-2xl shadow-indigo-100 border border-slate-100 max-w-lg w-full transform transition hover:scale-[1.02]">
            <div
                class="mb-8 inline-flex items-center justify-center w-28 h-28 rounded-[2rem] bg-indigo-50 text-indigo-600">
                <svg class="w-14 h-14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                        d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
            </div>
            <h1 class="text-7xl font-black text-slate-900 mb-2 tracking-tighter">404</h1>
            <h2 class="text-2xl font-black text-slate-800 mb-4 tracking-tight">Registry Missing</h2>
            <p class="text-slate-500 mb-10 font-medium leading-relaxed">The requested interface or data record could not
                be located in the current system session. It may have been relocated or purged.</p>

            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <a th:href="@{/dashboard}"
                    class="px-10 py-4 bg-indigo-600 text-white font-black rounded-2xl shadow-xl shadow-indigo-100 hover:bg-indigo-700 transition-all uppercase tracking-widest text-[10px]">
                    Return to Hub
                </a>
                <button onclick="window.history.back()"
                    class="px-10 py-4 bg-slate-50 text-slate-600 font-black rounded-2xl hover:bg-slate-100 transition-all uppercase tracking-widest text-[10px]">
                    Preceding Phase
                </button>
            </div>
        </div>
    </div>
</body>

</html>
