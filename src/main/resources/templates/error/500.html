<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout :: layout(pageTitle='System Error', content=~{this :: #main-content})}">

<body>
    <div id="main-content" class="flex flex-col items-center justify-center min-h-[60vh] text-center px-4">
        <div
            class="bg-white p-10 rounded-3xl shadow-2xl border border-orange-100 max-w-lg w-full transform transition hover:scale-105">
            <div
                class="mb-6 inline-flex items-center justify-center w-24 h-24 rounded-full bg-orange-100 text-orange-600">
                <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z">
                    </path>
                </svg>
            </div>
            <h1 class="text-6xl font-black text-gray-900 mb-2 tracking-tighter">500</h1>
            <h2 class="text-2xl font-bold text-gray-800 mb-4">Internal Server Error</h2>
            <p class="text-gray-600 mb-8 leading-relaxed">Something went wrong on our end. We're working to fix it.
                Please try again later.</p>

            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <a th:href="@{/dashboard}"
                    class="px-8 py-3 bg-gradient-to-r from-indigo-600 to-blue-600 text-white font-bold rounded-xl shadow-lg hover:from-indigo-700 hover:to-blue-700 transition-all flex items-center justify-center">
                    Back to Safety
                </a>
                <button onclick="location.reload()"
                    class="px-8 py-3 bg-white border-2 border-gray-200 text-gray-700 font-bold rounded-xl hover:bg-gray-50 transition-all">
                    Retry Page
                </button>
            </div>
        </div>
    </div>
</body>

</html>
