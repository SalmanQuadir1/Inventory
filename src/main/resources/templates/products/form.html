<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout :: layout(pageTitle=${productDto.id == null ? 'Add Product' : 'Edit Product'}, content=~{this :: #main-content})}">

<body>
    <div id="main-content" class="space-y-8">
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tight"
                    th:text="${productDto.id == null ? 'Add Product' : 'Edit Product Details'}">Add Product</h1>
                <p class="text-slate-500 mt-1 font-medium">Capture comprehensive product data securely.</p>
            </div>
            <a th:href="@{/products}"
                class="px-5 py-2.5 bg-slate-100 text-slate-600 rounded-xl text-xs font-black uppercase tracking-widest hover:bg-slate-200 transition-all">
                Return to Inventory
            </a>
        </div>

        <!-- Form Section -->
        <form th:action="@{/products/save}" th:object="${productDto}" method="post" enctype="multipart/form-data"
            class="space-y-12">
            <input type="hidden" th:field="*{id}">

            <div class="grid grid-cols-1 xl:grid-cols-3 gap-12">
                <!-- Information Groups -->
                <div class="xl:col-span-2 space-y-12">

                    <!-- General Info Group -->
                    <section class="space-y-6">
                        <h2 class="text-sm font-black text-indigo-600 uppercase tracking-[0.2em] flex items-center">
                            <span class="w-8 h-px bg-indigo-100 mr-3"></span>
                            Product Identification
                        </h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-1.5 focus-within:scale-[1.01] transition-transform">
                                <label
                                    class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Product
                                    Name *</label>
                                <input type="text" th:field="*{productName}" required
                                    class="block w-full px-5 py-3.5 bg-slate-50/50 border border-slate-200 rounded-2xl text-sm font-semibold text-slate-900 focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all outline-none">
                                <p class="text-rose-500 text-[10px] font-bold mt-1 px-1"
                                    th:if="${#fields.hasErrors('productName')}" th:errors="*{productName}"></p>
                            </div>
                            <div class="space-y-1.5 focus-within:scale-[1.01] transition-transform">
                                <label
                                    class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Short
                                    Description</label>
                                <input type="text" th:field="*{shortDescription}"
                                    class="block w-full px-5 py-3.5 bg-slate-50/50 border border-slate-200 rounded-2xl text-sm font-semibold text-slate-900 focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all outline-none">
                            </div>
                            <div class="space-y-1.5 focus-within:scale-[1.01] transition-transform">
                                <label
                                    class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Manufacturer
                                    / Brand</label>
                                <input type="text" th:field="*{manufacturer}"
                                    class="block w-full px-5 py-3.5 bg-slate-50/50 border border-slate-200 rounded-2xl text-sm font-semibold text-slate-900 focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all outline-none">
                            </div>
                            <div class="space-y-1.5 focus-within:scale-[1.01] transition-transform">
                                <label
                                    class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Product
                                    Category</label>
                                <input type="text" th:field="*{category}"
                                    class="block w-full px-5 py-3.5 bg-slate-50/50 border border-slate-200 rounded-2xl text-sm font-semibold text-slate-900 focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all outline-none">
                            </div>
                        </div>
                    </section>

                    <!-- Inventory & Pricing -->
                    <section class="space-y-6">
                        <h2 class="text-sm font-black text-indigo-600 uppercase tracking-[0.2em] flex items-center">
                            <span class="w-8 h-px bg-indigo-100 mr-3"></span>
                            Commercial & Stock
                        </h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="grid grid-cols-2 gap-4">
                                <div class="space-y-1.5 focus-within:scale-[1.01] transition-transform">
                                    <label
                                        class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Batch
                                        ID</label>
                                    <input type="text" th:field="*{batchNumber}"
                                        class="block w-full px-5 py-3.5 bg-slate-50/50 border border-slate-200 rounded-2xl text-sm font-semibold text-slate-900 focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all outline-none">
                                </div>
                                <div class="space-y-1.5 focus-within:scale-[1.01] transition-transform">
                                    <label
                                        class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Expiry
                                        Date *</label>
                                    <input type="date" th:field="*{expiryDate}" required
                                        class="block w-full px-5 py-3.5 bg-slate-50/50 border border-slate-200 rounded-2xl text-sm font-semibold text-slate-900 focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all outline-none">
                                    <p class="text-rose-500 text-[10px] font-bold mt-1 px-1"
                                        th:if="${#fields.hasErrors('expiryDate')}" th:errors="*{expiryDate}"></p>
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div class="space-y-1.5 focus-within:scale-[1.01] transition-transform">
                                    <label
                                        class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Purchase
                                        Rate *</label>
                                    <input type="number" step="0.01" th:field="*{purchasePrice}" required
                                        class="block w-full px-5 py-3.5 bg-slate-50/50 border border-slate-200 rounded-2xl text-sm font-semibold text-slate-900 focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all outline-none">
                                    <p class="text-rose-500 text-[10px] font-bold mt-1 px-1"
                                        th:if="${#fields.hasErrors('purchasePrice')}" th:errors="*{purchasePrice}"></p>
                                </div>
                                <div class="space-y-1.5 focus-within:scale-[1.01] transition-transform">
                                    <label
                                        class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Sales
                                        Rate *</label>
                                    <input type="number" step="0.01" th:field="*{sellingPrice}" required
                                        class="block w-full px-5 py-3.5 bg-slate-50/50 border border-slate-200 rounded-2xl text-sm font-semibold text-slate-900 focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all outline-none">
                                    <p class="text-rose-500 text-[10px] font-bold mt-1 px-1"
                                        th:if="${#fields.hasErrors('sellingPrice')}" th:errors="*{sellingPrice}"></p>
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div class="space-y-1.5 focus-within:scale-[1.01] transition-transform">
                                    <label
                                        class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Initial
                                        Quantity *</label>
                                    <input type="number" th:field="*{quantity}" required
                                        class="block w-full px-5 py-3.5 bg-slate-50/50 border border-slate-200 rounded-2xl text-sm font-semibold text-slate-900 focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all outline-none">
                                    <p class="text-rose-500 text-[10px] font-bold mt-1 px-1"
                                        th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}"></p>
                                </div>
                                <div class="space-y-1.5 focus-within:scale-[1.01] transition-transform">
                                    <label
                                        class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Reorder
                                        Level *</label>
                                    <input type="number" th:field="*{reorderLevel}" required
                                        class="block w-full px-5 py-3.5 bg-slate-50/50 border border-slate-200 rounded-2xl text-sm font-semibold text-slate-900 focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all outline-none">
                                    <p class="text-rose-500 text-[10px] font-bold mt-1 px-1"
                                        th:if="${#fields.hasErrors('reorderLevel')}" th:errors="*{reorderLevel}"></p>
                                </div>
                            </div>
                            <div class="space-y-1.5 focus-within:scale-[1.01] transition-transform">
                                <label
                                    class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Authorized
                                    Supplier</label>
                                <select th:field="*{supplierId}"
                                    class="block w-full px-5 py-3.5 bg-slate-50/50 border border-slate-200 rounded-2xl text-sm font-semibold text-slate-900 focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all outline-none appearance-none">
                                    <option value="">-- Non-Specified --</option>
                                    <option th:each="sup : ${suppliers}" th:value="${sup.id}"
                                        th:text="${sup.supplierName}"></option>
                                </select>
                            </div>
                        </div>
                    </section>
                </div>

                <!-- Visual Asset Column -->
                <div class="space-y-12">
                    <section class="space-y-6">
                        <h2 class="text-sm font-black text-indigo-600 uppercase tracking-[0.2em] flex items-center">
                            <span class="w-8 h-px bg-indigo-100 mr-3"></span>
                            Product Media
                        </h2>
                        <div
                            class="p-8 bg-slate-50/50 border-2 border-dashed border-slate-200 rounded-[2.5rem] text-center group hover:border-indigo-300 transition-all">
                            <input type="file" id="imageFileInput" th:field="*{imageFile}" class="hidden">
                            <div id="imagePreviewContainer" class="mb-4"
                                th:classappend="*{imagePath == null ? 'hidden' : ''}">
                                <img id="imagePreview" th:src="*{imagePath != null ? imagePath : '#'}"
                                    class="h-48 w-48 object-cover rounded-3xl mx-auto shadow-xl shadow-slate-200 border-4 border-white">
                            </div>
                            <div id="uploadPlaceholder" th:classappend="*{imagePath != null ? 'hidden' : ''}"
                                class="py-10">
                                <div
                                    class="w-16 h-16 bg-white rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-sm text-slate-400 group-hover:text-indigo-500 transition-colors">
                                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z">
                                        </path>
                                    </svg>
                                </div>
                                <p class="text-xs font-bold text-slate-500 uppercase tracking-widest">Select Product
                                    Media</p>
                                <p class="text-[10px] text-slate-400 mt-1">Recommended size 500x500px</p>
                            </div>
                            <button type="button" onclick="document.getElementById('imageFileInput').click()"
                                class="mt-4 px-6 py-2.5 bg-white border border-slate-200 text-slate-700 rounded-xl text-xs font-black uppercase tracking-widest hover:bg-slate-50 transition-all shadow-sm">
                                Choose Image
                            </button>
                        </div>
                    </section>

                    <section class="space-y-3 bg-indigo-50/50 p-6 rounded-3xl border border-indigo-100/50">
                        <p class="text-[10px] font-black text-indigo-400 uppercase tracking-widest">Data Submission</p>
                        <p class="text-xs font-medium text-indigo-700 leading-relaxed">Ensure all data is accurate
                            before establishing record.</p>
                        <button type="submit"
                            class="w-full py-4 bg-indigo-600 text-white rounded-2xl text-sm font-black shadow-xl shadow-indigo-100 hover:bg-indigo-700 hover:-translate-y-1 transition-all uppercase tracking-widest mt-4">
                            Process Record
                        </button>
                    </section>
                </div>
            </div>
        </form>

        <script>
            document.getElementById('imageFileInput').addEventListener('change', function (event) {
                const file = event.target.files[0];
                const preview = document.getElementById('imagePreview');
                const container = document.getElementById('imagePreviewContainer');
                const placeholder = document.getElementById('uploadPlaceholder');

                if (file) {
                    const reader = new FileReader();
                    reader.onload = function (e) {
                        preview.src = e.target.result;
                        container.classList.remove('hidden');
                        placeholder.classList.add('hidden');
                    }
                    reader.readAsDataURL(file);
                }
            });
        </script>
    </div>
</body>

</html>
