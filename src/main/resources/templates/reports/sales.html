<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html(content=~{::div})}">

<body>
    <div class="space-y-6">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center no-print">
            <div>
                <h1 class="text-3xl font-bold text-gray-900">Sales Report</h1>
                <p class="text-gray-500 mt-1">Summary of sales transactions for the selected period.</p>
            </div>
            <div class="mt-4 md:mt-0 flex space-x-2">
                <button onclick="window.print()"
                    class="px-5 py-2.5 bg-indigo-600 text-white rounded-lg shadow hover:bg-indigo-700 font-semibold focus:ring-4 focus:ring-indigo-300 transition-all flex items-center">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z">
                        </path>
                    </svg>
                    Print Report
                </button>
                <a th:href="@{/reports}"
                    class="px-5 py-2.5 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 font-semibold transition-all">Back
                    to Reports</a>
            </div>
        </div>

        <!-- Date Filter Form -->
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 no-print">
            <form th:action="@{/reports/sales}" method="get" class="grid grid-cols-1 md:grid-cols-3 gap-6 items-end">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Start Date</label>
                    <input type="datetime-local" name="start" th:value="${start}"
                        class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">End Date</label>
                    <input type="datetime-local" name="end" th:value="${end}"
                        class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                <button type="submit"
                    class="bg-gray-800 text-white px-6 py-2.5 rounded-lg hover:bg-gray-900 transition-all font-bold">Generate
                    Report</button>
            </form>
        </div>

        <div class="print-only hidden">
            <h1 class="text-center text-4xl font-extrabold mb-2">OmniStore Inventory</h1>
            <h2 class="text-center text-2xl font-bold text-gray-700 mb-8 border-b pb-4">Sales Report Summary</h2>
            <div class="flex justify-between text-sm text-gray-600 mb-6 font-mono">
                <span>Period: <span th:text="${#temporals.format(start, 'dd-MMM-yyyy HH:mm')}"></span> to <span
                        th:text="${#temporals.format(end, 'dd-MMM-yyyy HH:mm')}"></span></span>
                <span>Generated: <span
                        th:text="${#temporals.format(#temporals.createNow(), 'dd-MMM-yyyy HH:mm')}"></span></span>
            </div>
        </div>

        <div class="bg-white shadow-lg rounded-2xl overflow-hidden border border-gray-100">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-widest">
                                Bill ID</th>
                            <th class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-widest">
                                Date & Time</th>
                            <th class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-widest">
                                Customer / Notes</th>
                            <th class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-widest">
                                Method</th>
                            <th class="px-6 py-4 text-right text-xs font-bold text-gray-500 uppercase tracking-widest">
                                Amount (₹)</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100">
                        <tr th:each="sale : ${reportData.transactions}" class="hover:bg-indigo-50/30 transition-all">
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-bold text-indigo-600"
                                th:text="${'INV-' + sale.id}"></td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600"
                                th:text="${sale.saleDate != null ? #temporals.format(sale.saleDate, 'dd-MMM-yyyy HH:mm') : '---'}">
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <div class="text-sm font-medium text-gray-900"
                                    th:text="${sale.customerName ?: 'Walk-in'}"></div>
                                <div class="text-xs text-gray-500"
                                    th:text="${sale.remarks != null ? sale.remarks : 'N/A'}"></div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <span th:text="${sale.paymentMethod}"
                                    class="px-2.5 py-0.5 rounded text-xs font-bold uppercase tracking-tighter"
                                    th:classappend="${sale.paymentMethod == 'CASH' ? 'bg-green-100 text-green-800' : 'bg-blue-100 text-blue-800'}"></span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-black text-gray-900"
                                th:text="${sale.totalAmount}"></td>
                        </tr>
                    </tbody>
                    <tfoot class="bg-gray-900 text-white">
                        <tr>
                            <td colspan="4" class="px-6 py-4 text-right font-bold text-sm uppercase tracking-widest">
                                Total Sales Revenue</td>
                            <td class="px-6 py-4 text-right font-black text-xl"
                                th:text="${'₹' + reportData.totalRevenue}"></td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>
    </div>
</body>

</html>
