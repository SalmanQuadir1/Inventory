<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout :: layout(pageTitle=${reportTitle}, content=~{this :: #main-content})}">

<body>
    <div id="main-content">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-semibold text-gray-800" th:text="${reportTitle}">Report</h1>
            <div>
                <button onclick="window.print()"
                    class="px-4 py-2 bg-gray-600 text-white rounded hover:bg-gray-700 focus:outline-none mr-2">Print
                    Report</button>
                <a th:href="@{/reports}" class="text-gray-600 hover:text-gray-900">Back</a>
            </div>
        </div>

        <div class="bg-white shadow-md rounded-lg overflow-hidden">
            <div class="overflow-x-auto">
                <table class="min-w-full leading-normal">
                    <thead>
                        <tr>
                            <th
                                class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">
                                Product Name</th>
                            <th
                                class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">
                                Batch No</th>
                            <th
                                class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">
                                Supplier</th>
                            <th
                                class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-center text-xs font-semibold text-gray-600 uppercase tracking-wider">
                                Current Stock</th>
                            <th
                                class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-center text-xs font-semibold text-gray-600 uppercase tracking-wider">
                                Expiry Date</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="product : ${products}">
                            <td class="px-5 py-5 border-b border-gray-200 text-sm font-bold text-gray-900"
                                th:text="${product.productName}"></td>
                            <td class="px-5 py-5 border-b border-gray-200 text-sm text-gray-600"
                                th:text="${product.batchNumber}"></td>
                            <td class="px-5 py-5 border-b border-gray-200 text-sm" th:text="${product.supplierName}">
                            </td>
                            <td class="px-5 py-5 border-b border-gray-200 text-sm text-center font-bold"
                                th:classappend="${product.quantity != null and product.reorderLevel != null and product.quantity <= product.reorderLevel ? 'text-rose-600' : 'text-emerald-600'}"
                                th:text="${(product.quantity ?: 0) + ' (Min: ' + (product.reorderLevel ?: 0) + ')'}">
                            </td>
                            <td class="px-5 py-5 border-b border-gray-200 text-sm text-center font-bold"
                                th:classappend="${product.expiryDate != null and product.expiryDate.isBefore(#temporals.createNow().toLocalDate()) ? 'text-rose-600' : 'text-slate-800'}"
                                th:text="${product.expiryDate != null ? #temporals.format(product.expiryDate, 'dd-MMM-yyyy') : 'N/A'}">
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(products)}">
                            <td colspan="5"
                                class="px-5 py-5 border-b border-gray-200 text-sm text-center text-gray-500">
                                No records found for this report.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>

</html>
