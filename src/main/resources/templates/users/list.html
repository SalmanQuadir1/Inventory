<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout :: layout(pageTitle='System Access', content=~{this :: #main-content})}">

<body>
    <div id="main-content" class="space-y-8">
        <!-- Header Section -->
        <div class="flex flex-col md:flex-row justify-between items-center gap-6">
            <div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tight">System Access</h1>
                <p class="text-slate-500 mt-1 font-medium">Control administrative privileges and staff authorization
                    levels.</p>
            </div>
            <a th:href="@{/users/new}"
                class="flex items-center px-6 py-3 bg-indigo-600 text-white font-bold rounded-2xl shadow-xl shadow-indigo-100 hover:bg-indigo-700 hover:-translate-y-0.5 transition-all">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                        d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path>
                </svg>
                Provision Account
            </a>
        </div>

        <!-- Users Table -->
        <div class="overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full border-separate border-spacing-y-3">
                    <thead>
                        <tr class="text-left">
                            <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Staff
                                Profile</th>
                            <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">
                                Authorization Role</th>
                            <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">
                                System Status</th>
                            <th
                                class="px-6 py-4 text-center text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">
                                Admin Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user : ${users}" class="bg-white group">
                            <td
                                class="px-6 py-5 rounded-l-3xl border-y border-l border-slate-100 group-hover:bg-slate-50 transition-colors">
                                <div class="flex items-center">
                                    <div class="w-12 h-12 rounded-2xl flex items-center justify-center font-black text-lg border-2 border-white shadow-sm transition-transform group-hover:scale-110"
                                        th:classappend="${user.role.name() == 'ADMIN' ? 'bg-indigo-600 text-white' : (user.role.name() == 'PHARMACIST' ? 'bg-emerald-500 text-white' : 'bg-slate-200 text-slate-600')}"
                                        th:text="${#strings.substring(user.name,0,1).toUpperCase()}">U</div>
                                    <div class="ml-4">
                                        <p class="text-sm font-black text-slate-900 leading-none mb-1.5"
                                            th:text="${user.name}"></p>
                                        <div class="flex items-center gap-2 mt-1">
                                            <p class="text-[10px] font-bold text-slate-400 tracking-widest uppercase"
                                                th:text="${user.username}"></p>
                                            <span th:if="${user.storeName != null}" class="px-2 py-0.5 bg-indigo-50 text-indigo-600 rounded text-[9px] font-bold uppercase tracking-widest border border-indigo-100/50" th:text="${user.storeName}"></span>
                                            <span th:if="${user.storeName == null}" class="px-2 py-0.5 bg-slate-100 text-slate-500 rounded text-[9px] font-bold uppercase tracking-widest border border-slate-200">Global System</span>
                                        </div>
                                    </div>
                                </div>
                            </td>
                            <td class="px-6 py-5 border-y border-slate-100 group-hover:bg-slate-50 transition-colors">
                                <span class="px-3 py-1.5 text-[10px] font-black uppercase tracking-widest rounded-xl"
                                    th:classappend="${user.role.name() == 'ADMIN' ? 'bg-indigo-50 text-indigo-600' : (user.role.name() == 'PHARMACIST' ? 'bg-emerald-50 text-emerald-600' : 'bg-slate-100 text-slate-500')}"
                                    th:text="${user.role}"></span>
                            </td>
                            <td class="px-6 py-5 border-y border-slate-100 group-hover:bg-slate-50 transition-colors">
                                <div class="flex items-center">
                                    <div class="w-2 h-2 rounded-full mr-2"
                                        th:classappend="${user.enabled ? 'bg-emerald-500' : 'bg-rose-500'}"></div>
                                    <span class="text-xs font-black uppercase tracking-widest"
                                        th:classappend="${user.enabled ? 'text-emerald-600' : 'text-rose-600'}"
                                        th:text="${user.enabled ? 'Enabled' : 'Locked'}"></span>
                                </div>
                            </td>
                            <td
                                class="px-6 py-5 rounded-r-3xl border-y border-r border-slate-100 group-hover:bg-slate-50 transition-colors">
                                <div class="flex items-center justify-center space-x-2">
                                    <a th:href="@{/users/edit/{id}(id=${user.id})}"
                                        class="p-2 text-slate-400 hover:text-indigo-600 transition-colors"
                                        title="Edit Profile">
                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z">
                                            </path>
                                        </svg>
                                    </a>
                                    <a th:href="@{/users/toggle/{id}(id=${user.id})}" title="Toggle Access"
                                        class="p-2 transition-all rounded-xl"
                                        th:classappend="${user.enabled ? 'text-slate-400 hover:text-rose-600 hover:bg-rose-50' : 'text-slate-400 hover:text-emerald-600 hover:bg-emerald-50'}"
                                        onclick="return confirm('Change system access for this operator?');">
                                        <svg th:if="${user.enabled}" class="w-5 h-5" fill="none" stroke="currentColor"
                                            viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                                            </path>
                                        </svg>
                                        <svg th:if="${!user.enabled}" class="w-5 h-5" fill="none" stroke="currentColor"
                                            viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                d="M8 11V7a4 4 0 118 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z">
                                            </path>
                                        </svg>
                                    </a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <!-- Pagination Controls -->
            <div th:if="${totalPages > 1}" class="flex flex-col sm:flex-row justify-between items-center bg-white px-6 py-4 border-t border-slate-100 rounded-b-3xl gap-4">
                <div class="text-[11px] font-black text-slate-400 uppercase tracking-widest text-center sm:text-left">
                    Showing <span th:text="${(currentPage - 1) * 10 + 1}"></span> to <span th:text="${(currentPage * 10) > totalItems ? totalItems : (currentPage * 10)}"></span> of <span th:text="${totalItems}"></span> results
                </div>
                <div class="flex space-x-2">
                    <a th:if="${currentPage > 1}" th:href="@{'/users?page=1' + '&sortField=' + ${sortField} + '&sortDir=' + ${sortDir}}" class="px-3 py-1 bg-slate-50 text-slate-600 rounded-lg text-sm font-bold hover:bg-slate-200 transition-colors">First</a>
                    <a th:if="${currentPage > 1}" th:href="@{'/users?page=' + ${currentPage - 1} + '&sortField=' + ${sortField} + '&sortDir=' + ${sortDir}}" class="px-3 py-1 bg-slate-50 text-slate-600 rounded-lg text-sm font-bold hover:bg-slate-200 transition-colors">Prev</a>
                    
                    <span class="px-3 py-1 bg-indigo-600 text-white rounded-lg text-sm font-bold shadow-sm">Page [[${currentPage}]] of [[${totalPages}]]</span>
                    
                    <a th:if="${currentPage < totalPages}" th:href="@{'/users?page=' + ${currentPage + 1} + '&sortField=' + ${sortField} + '&sortDir=' + ${sortDir}}" class="px-3 py-1 bg-slate-50 text-slate-600 rounded-lg text-sm font-bold hover:bg-slate-200 transition-colors">Next</a>
                    <a th:if="${currentPage < totalPages}" th:href="@{'/users?page=' + ${totalPages} + '&sortField=' + ${sortField} + '&sortDir=' + ${sortDir}}" class="px-3 py-1 bg-slate-50 text-slate-600 rounded-lg text-sm font-bold hover:bg-slate-200 transition-colors">Last</a>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
