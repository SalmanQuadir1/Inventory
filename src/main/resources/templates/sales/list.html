<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout :: layout(pageTitle='Revenue Operations', content=~{this :: #main-content})}">

<body>
    <div id="main-content" class="space-y-8">
        <!-- Header Section -->
        <div class="flex flex-col md:flex-row justify-between items-center gap-6">
            <div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tight">Revenue Operations</h1>
                <p class="text-slate-500 mt-1 font-medium">Monitor point-of-sale transactions and digital payment
                    distribution.</p>
            </div>
            <a th:href="@{/sales/new}"
                class="flex items-center px-6 py-3 bg-indigo-600 text-white font-bold rounded-2xl shadow-xl shadow-indigo-100 hover:bg-indigo-700 hover:-translate-y-0.5 transition-all">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                        d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z">
                    </path>
                </svg>
                New Billing Session
            </a>
        </div>

        <!-- Sales Table -->
        <div class="overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full border-separate border-spacing-y-3">
                    <thead>
                        <tr class="text-left">
                            <th class="px-6 py-4 w-[20%] text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">
                                Invoice ID</th>
                            <th class="px-6 py-4 w-[25%] text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Time
                                Stamp</th>
                            <th class="px-6 py-4 w-[20%] text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">
                                Method</th>
                            <th class="px-6 py-4 w-[20%] text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Net
                                Revenue</th>
                            <th
                                class="px-6 py-4 w-[15%] text-center text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">
                                Management</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="sale : ${sales}" class="bg-white group">
                            <td
                                class="px-6 py-5 rounded-l-3xl border-y border-l border-slate-100 group-hover:bg-slate-50 transition-colors">
                                <span
                                    class="px-3 py-1 bg-indigo-50 text-indigo-600 rounded-lg text-xs font-black tracking-widest"
                                    th:text="'INV-' + ${sale.id}"></span>
                            </td>
                            <td class="px-6 py-5 border-y border-slate-100 group-hover:bg-slate-50 transition-colors">
                                <div class="flex items-center text-sm font-bold text-slate-700">
                                    <svg class="w-4 h-4 mr-2 text-slate-400" fill="none" stroke="currentColor"
                                        viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                                    </svg>
                                    <span th:text="${#temporals.format(sale.saleDate, 'dd-MM-yyyy HH:mm')}"></span>
                                </div>
                            </td>
                            <td class="px-6 py-5 border-y border-slate-100 group-hover:bg-slate-50 transition-colors">
                                <span
                                    class="px-4 py-1.5 text-[10px] font-black uppercase tracking-widest rounded-xl bg-slate-100 text-slate-500 group-hover:bg-indigo-600 group-hover:text-white transition-all"
                                    th:text="${sale.paymentMethod}"></span>
                            </td>
                            <td class="px-6 py-5 border-y border-slate-100 group-hover:bg-slate-50 transition-colors">
                                <span class="text-sm font-black text-emerald-600"
                                    th:text="'₹' + ${sale.totalAmount}"></span>
                            </td>
                            <td
                                class="px-6 py-5 rounded-r-3xl border-y border-r border-slate-100 group-hover:bg-slate-50 transition-colors text-center">
                                <a th:href="@{/sales/{id}(id=${sale.id})}"
                                    class="inline-flex items-center px-4 py-2 bg-slate-50 text-slate-600 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-slate-900 hover:text-white transition-all">
                                    <svg class="w-3 h-3 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z">
                                        </path>
                                    </svg>
                                    Examine
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(sales)}">
                            <td colspan="5"
                                class="px-6 py-20 text-center text-slate-400 font-bold uppercase tracking-widest">
                                No Revenue Records Detected
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <!-- Pagination Controls -->
            <div th:if="${totalPages > 1}" class="flex flex-col sm:flex-row justify-between items-center bg-white px-6 py-4 border-t border-slate-100 rounded-b-3xl gap-4">
                <div class="text-[11px] font-black text-slate-400 uppercase tracking-widest text-center sm:text-left">
                    Showing <span th:text="${(currentPage - 1) * 10 + 1}"></span> to <span th:text="${(currentPage * 10) > totalItems ? totalItems : (currentPage * 10)}"></span> of <span th:text="${totalItems}"></span> results
                </div>
                <div class="flex space-x-2">
                    <a th:if="${currentPage > 1}" th:href="@{'/sales?page=1' + '&sortField=' + ${sortField} + '&sortDir=' + ${sortDir}}" class="px-3 py-1 bg-slate-50 text-slate-600 rounded-lg text-sm font-bold hover:bg-slate-200 transition-colors">First</a>
                    <a th:if="${currentPage > 1}" th:href="@{'/sales?page=' + ${currentPage - 1} + '&sortField=' + ${sortField} + '&sortDir=' + ${sortDir}}" class="px-3 py-1 bg-slate-50 text-slate-600 rounded-lg text-sm font-bold hover:bg-slate-200 transition-colors">Prev</a>
                    
                    <span class="px-3 py-1 bg-indigo-600 text-white rounded-lg text-sm font-bold shadow-sm">Page [[${currentPage}]] of [[${totalPages}]]</span>
                    
                    <a th:if="${currentPage < totalPages}" th:href="@{'/sales?page=' + ${currentPage + 1} + '&sortField=' + ${sortField} + '&sortDir=' + ${sortDir}}" class="px-3 py-1 bg-slate-50 text-slate-600 rounded-lg text-sm font-bold hover:bg-slate-200 transition-colors">Next</a>
                    <a th:if="${currentPage < totalPages}" th:href="@{'/sales?page=' + ${totalPages} + '&sortField=' + ${sortField} + '&sortDir=' + ${sortDir}}" class="px-3 py-1 bg-slate-50 text-slate-600 rounded-lg text-sm font-bold hover:bg-slate-200 transition-colors">Last</a>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
