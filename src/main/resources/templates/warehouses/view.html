<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout :: layout(pageTitle='Warehouse Details', content=~{this :: #main-content})}">

<body>
    <div id="main-content" class="space-y-8">
        <div class="flex flex-col md:flex-row justify-between items-center gap-6">
            <div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tight" th:text="${warehouse.name}">Warehouse</h1>
                <p class="text-slate-500 mt-1 font-medium text-sm">
                    Code: <span class="font-bold border-r pr-2 mr-2" th:text="${warehouse.code}"></span>
                    Manager: <span class="font-bold text-indigo-600" th:text="${warehouse.managerName}"></span>
                </p>
            </div>
            <div class="flex gap-4">
                <a th:href="@{/warehouses}"
                    class="px-5 py-2.5 bg-slate-100 text-slate-600 rounded-xl text-xs font-black uppercase tracking-widest hover:bg-slate-200 transition-all">
                    Back to List
                </a>
                <a th:href="@{/zones/new(warehouseId=${warehouse.id})}"
                    class="px-5 py-2.5 bg-indigo-600 text-white rounded-xl text-xs font-black uppercase tracking-widest hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-200">
                    Add Zone
                </a>
            </div>
        </div>

        <div th:if="${successMessage}" class="p-4 bg-emerald-50 text-emerald-700 rounded-xl font-bold">
            <p th:text="${successMessage}"></p>
        </div>

        <div class="bg-white rounded-[2rem] border border-slate-100 shadow-sm overflow-hidden mt-8">
            <div class="px-8 py-5 border-b border-slate-100 bg-slate-50/30">
                <h2 class="text-xs font-black text-slate-600 uppercase tracking-widest">Zones in <span th:text="${warehouse.name}"></span></h2>
            </div>
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-50/50 border-b border-slate-100">
                        <th class="px-6 py-4 text-xs font-black text-slate-500 uppercase tracking-widest">Zone Name</th>
                        <th class="px-6 py-4 text-xs font-black text-slate-500 uppercase tracking-widest">Code</th>
                        <th class="px-6 py-4 text-xs font-black text-slate-500 uppercase tracking-widest">Type</th>
                        <th class="px-6 py-4 text-xs font-black text-slate-500 uppercase tracking-widest text-right">Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-50">
                    <tr th:each="z : ${zones}" class="hover:bg-slate-50/50 transition-colors">
                        <td class="px-6 py-4 font-bold text-slate-800" th:text="${z.name}"></td>
                        <td class="px-6 py-4 text-slate-600 font-medium" th:text="${z.code}"></td>
                        <td class="px-6 py-4">
                            <span class="px-2.5 py-1 bg-violet-100 text-violet-700 rounded-lg text-[10px] font-black uppercase tracking-widest" th:text="${z.type}"></span>
                        </td>
                        <td class="px-6 py-4 text-right">
                            <a th:href="@{/zones/{id}(id=${z.id})}" class="text-indigo-600 hover:text-indigo-800 font-bold text-sm">View Bins</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(zones)}">
                        <td colspan="4" class="px-6 py-12 text-center text-slate-400 font-bold uppercase tracking-widest text-sm">No Zones Found. Add a zone to get started.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
