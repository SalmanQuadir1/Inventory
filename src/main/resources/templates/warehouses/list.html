<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout :: layout(pageTitle='Branch Network', content=~{this :: #main-content})}">

<body>
    <div id="main-content" class="space-y-8">
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-center gap-6">
            <div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tight">Branch Network</h1>
                <p class="text-slate-500 mt-1 font-medium">Global management of all physical store locations and infrastructure.</p>
            </div>
            <a th:href="@{/warehouses/new}"
                class="flex items-center px-6 py-3 bg-indigo-600 text-white font-bold rounded-2xl shadow-xl shadow-indigo-100 hover:bg-indigo-700 hover:-translate-y-0.5 transition-all">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                        d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path>
                </svg>
                Establish Branch
            </a>
        </div>

        <div th:if="${successMessage}" class="p-4 bg-emerald-50 text-emerald-700 rounded-xl font-bold flex items-center shadow-sm">
            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
            <span th:text="${successMessage}"></span>
        </div>
        <div th:if="${errorMessage}" class="p-4 bg-rose-50 text-rose-700 rounded-xl font-bold flex items-center shadow-sm">
            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            <span th:text="${errorMessage}"></span>
        </div>

        <!-- Grid Layout for Warehouses -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            
            <div th:each="w : ${warehouses}" class="bg-white rounded-[2.5rem] border border-slate-100 shadow-md shadow-slate-200/50 p-6 hover:shadow-xl hover:-translate-y-1 transition-all group relative overflow-hidden flex flex-col justify-between">
                <div>
                     <div class="w-12 h-12 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center mb-6">
                          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
                     </div>
                     <h2 class="text-xl font-black text-slate-800 tracking-tight" th:text="${w.name}"></h2>
                     <p class="text-[10px] font-black tracking-widest text-indigo-500 uppercase mt-1 mb-4" th:text="${w.code}">CODE</p>
                     
                     <div class="space-y-3 mb-6">
                         <div class="flex items-start text-sm font-semibold text-slate-600">
                             <svg class="w-4 h-4 mr-3 mt-0.5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                             <span th:text="${w.location}"></span>
                         </div>
                         <div class="flex items-center text-sm font-semibold text-slate-600">
                             <svg class="w-4 h-4 mr-3 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                             Manager: <span th:text="${w.managerName ?: 'Unassigned'}" class="ml-1 text-slate-900"></span>
                         </div>
                     </div>
                </div>

                <div class="flex items-center gap-3 pt-6 border-t border-slate-100">
                    <a th:href="@{/warehouses/{id}(id=${w.id})}" class="flex-1 text-center py-2.5 bg-indigo-50 text-indigo-700 font-bold text-xs uppercase tracking-widest rounded-xl hover:bg-indigo-600 hover:text-white transition-colors">Floor Plan</a>
                    <a th:href="@{/warehouses/new(id=${w.id})}" class="p-2.5 bg-slate-50 text-slate-500 hover:text-indigo-600 hover:bg-indigo-50 font-bold text-xs uppercase tracking-widest rounded-xl transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                    </a>
                </div>
            </div>

            <!-- Empty State -->
            <div th:if="${#lists.isEmpty(warehouses)}" class="col-span-1 md:col-span-2 lg:col-span-3 text-center py-20 bg-white rounded-[3rem] border border-slate-100 shadow-sm">
                 <div class="inline-flex items-center justify-center w-24 h-24 rounded-full bg-slate-50 mb-6">
                      <svg class="w-10 h-10 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
                 </div>
                 <h3 class="text-xl font-black text-slate-800 mb-2">No Branches Configured</h3>
                 <p class="text-slate-500 font-medium max-w-sm mx-auto">Establish your physical storage networks to enable inventory mapping and cross-branch logistics.</p>
            </div>
        </div>
    </div>
</body>
</html>
