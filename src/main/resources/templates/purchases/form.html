<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout :: layout(pageTitle='Stock Acquisition', content=~{this :: #main-content})}">

<body>
    <div id="main-content" x-data="purchaseForm()" class="space-y-8">
        <!-- Header Section -->
        <div class="flex flex-col md:flex-row justify-between items-center gap-6">
            <div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tight">Stock Acquisition Order</h1>
                <p class="text-slate-500 mt-1 font-medium">Record incoming inventory and generate supplier purchase invoices.</p>
            </div>
            <a th:href="@{/purchases}"
                class="px-5 py-2.5 bg-slate-100 text-slate-600 rounded-xl text-xs font-black uppercase tracking-widest hover:bg-slate-200 transition-all">
                Acquisition Ledger
            </a>
        </div>

        <form th:action="@{/purchases/save}" th:object="${purchaseDto}" method="post" id="poForm" class="space-y-12">
            <!-- Validation Errors Summary -->
            <div th:if="${#fields.hasErrors('*')}"
                class="p-6 bg-rose-50 border border-rose-100 rounded-[2rem] shadow-sm no-print mb-8">
                <div class="flex items-center text-rose-700 mb-4">
                    <div class="w-8 h-8 bg-rose-500 rounded-lg flex items-center justify-center mr-3 shadow-md">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </div>
                    <p class="font-black text-xs uppercase tracking-widest">Incomplete Acquisition Data</p>
                </div>
                <ul class="space-y-1 ml-11">
                    <li th:each="err : ${#fields.allErrors()}" th:text="${err}"
                        class="text-[11px] font-bold text-rose-600 list-disc"></li>
                </ul>
            </div>

            <div class="grid grid-cols-1 xl:grid-cols-3 gap-12">
                <!-- Left Column: Context and Items -->
                <div class="xl:col-span-2 space-y-12">

                    <!-- Supplier & Invoice Group -->
                    <section class="space-y-6">
                        <h2 class="text-sm font-black text-indigo-600 uppercase tracking-[0.2em] flex items-center">
                            <span class="w-8 h-px bg-indigo-100 mr-3"></span>
                            Supplier Context
                        </h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 p-8 bg-white border border-slate-100 rounded-[2.5rem] shadow-sm">
                            <div class="md:col-span-2 space-y-1.5 focus-within:scale-[1.01] transition-transform">
                                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Supplier Entity *</label>
                                <select th:field="*{supplierId}" required
                                    class="block w-full px-5 py-3.5 bg-slate-50/50 border border-slate-200 rounded-2xl text-sm font-semibold text-slate-900 focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all outline-none appearance-none">
                                    <option value="">-- Select Supplier --</option>
                                    <option th:each="sup : ${suppliers}" th:value="${sup.id}" th:text="${sup.supplierName}"></option>
                                </select>
                            </div>
                            <div class="space-y-1.5 focus-within:scale-[1.01] transition-transform">
                                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Invoice Number</label>
                                <input type="text" th:field="*{invoiceNumber}"
                                    class="block w-full px-5 py-3.5 bg-slate-50/50 border border-slate-200 rounded-2xl text-sm font-semibold text-slate-900 focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all outline-none"
                                    placeholder="e.g. INV-2026-01">
                            </div>
                            <div class="space-y-1.5 focus-within:scale-[1.01] transition-transform">
                                <div class="grid grid-cols-2 gap-4">
                                    <div>
                                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Invoice Date *</label>
                                        <input type="date" th:field="*{invoiceDate}" required
                                            class="block w-full px-4 py-3.5 bg-slate-50/50 border border-slate-200 rounded-2xl text-sm font-semibold text-slate-900 focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all outline-none">
                                    </div>
                                    <div>
                                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Entry Date *</label>
                                        <input type="date" th:field="*{purchaseDate}" required
                                            class="block w-full px-4 py-3.5 bg-slate-50/50 border border-slate-200 rounded-2xl text-sm font-semibold text-slate-900 focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all outline-none">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    <!-- Items Basket Group -->
                    <section class="space-y-6">
                        <div class="flex justify-between items-center">
                            <h2 class="text-sm font-black text-indigo-600 uppercase tracking-[0.2em] flex items-center">
                                <span class="w-8 h-px bg-indigo-100 mr-3"></span>
                                Consignment Items
                            </h2>
                            <button type="button" @click="addItem()"
                                class="px-4 py-2 bg-emerald-50 text-emerald-600 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-emerald-500 hover:text-white transition-all">
                                Add Line Item
                            </button>
                        </div>

                        <div class="space-y-4">
                            <template x-for="(item, index) in items" :key="index">
                                <div class="grid grid-cols-1 md:grid-cols-12 items-center gap-4 bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm group hover:border-indigo-200 transition-all">
                                    <div class="col-span-1 md:col-span-6 lg:col-span-7 relative">
                                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Product Identification</label>
                                        <input type="text" x-model="item.searchQuery" @input.debounce.300ms="searchProducts(index)" 
                                            placeholder="Type 2+ letters to search..." required autocomplete="off"
                                            class="mt-1 block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-semibold text-slate-900 focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all outline-none">
                                        <input type="hidden" x-model="item.productId" :name="'items['+index+'].productId'" required>
                                        
                                        <div x-show="item.showResults" @click.away="item.showResults = false" x-cloak
                                             class="absolute z-50 w-full mt-1 bg-white border border-slate-200 rounded-xl shadow-2xl max-h-60 overflow-y-auto">
                                            <template x-for="prod in item.searchResults" :key="prod.id">
                                                <div @click="selectProduct(index, prod)" 
                                                     class="px-4 py-3 cursor-pointer hover:bg-indigo-50 border-b border-slate-50 last:border-0 transition-colors">
                                                    <div class="text-sm font-bold text-slate-800" x-text="prod.productName"></div>
                                                    <div class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-0.5">
                                                        Purchase Cost: ₹<span x-text="prod.purchasePrice"></span> | Stock: <span x-text="prod.quantity"></span>
                                                    </div>
                                                </div>
                                            </template>
                                            <div x-show="item.searchResults.length === 0" class="px-4 py-3 text-xs font-bold text-slate-500 text-center">No products found.</div>
                                        </div>
                                    </div>
                                    <div class="col-span-1 md:col-span-2 lg:col-span-2">
                                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Quantity</label>
                                        <input type="number" x-model="item.quantity" :name="'items['+index+'].quantity'" min="1" required
                                            class="mt-1 block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-semibold text-slate-900 focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all outline-none text-center">
                                    </div>
                                    <div class="col-span-1 md:col-span-3 lg:col-span-2">
                                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Rate (₹)</label>
                                        <input type="number" step="0.01" x-model="item.price" :name="'items['+index+'].price'" min="0" required
                                            class="mt-1 block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-semibold text-slate-900 focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all outline-none text-center">
                                    </div>
                                    <div class="col-span-1 md:col-span-11 lg:col-span-1 pt-5 flex justify-end lg:justify-center">
                                        <button type="button" @click="removeItem(index)"
                                            class="w-10 h-10 flex items-center justify-center text-slate-300 hover:text-rose-600 hover:bg-rose-50 rounded-xl transition-all">
                                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                    d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                                            </svg>
                                        </button>
                                    </div>
                                    <div class="col-span-12 grid grid-cols-1 md:grid-cols-11 gap-4 mt-2 pt-4 border-t border-dashed border-slate-200">
                                        <div class="col-span-1 md:col-span-4 lg:col-span-4">
                                            <label class="text-[10px] font-black text-indigo-400 uppercase tracking-widest ml-1">Target Bin</label>
                                            <select x-model="item.binId" :name="'items['+index+'].binId'" required class="mt-1 block w-full px-4 py-2.5 bg-indigo-50 border border-indigo-100 rounded-xl text-xs font-bold text-indigo-900 focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all outline-none appearance-none">
                                                <option value="">-- Assign Bin --</option>
                                                <option th:each="bin : ${bins}" th:value="${bin.id}" th:text="${bin.name}"></option>
                                            </select>
                                        </div>
                                        <div class="col-span-1 md:col-span-4 lg:col-span-4">
                                            <label class="text-[10px] font-black text-indigo-400 uppercase tracking-widest ml-1">Batch Number</label>
                                            <input type="text" x-model="item.batchNumber" :name="'items['+index+'].batchNumber'" required class="mt-1 block w-full px-4 py-2.5 bg-indigo-50 border border-indigo-100 rounded-xl text-xs font-bold text-indigo-900 focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all outline-none">
                                        </div>
                                        <div class="col-span-1 md:col-span-3 lg:col-span-3">
                                            <label class="text-[10px] font-black text-indigo-400 uppercase tracking-widest ml-1">Expiry Date</label>
                                            <input type="date" x-model="item.expiryDate" :name="'items['+index+'].expiryDate'" class="mt-1 block w-full px-4 py-2.5 bg-indigo-50 border border-indigo-100 rounded-xl text-xs font-bold text-indigo-900 focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all outline-none">
                                        </div>
                                    </div>
                                </div>
                            </template>

                            <div x-show="items.length === 0" class="py-12 border-2 border-dashed border-slate-200 rounded-[2.5rem] text-center">
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Consignment Vacancy</p>
                            </div>
                        </div>
                    </section>
                </div>

                <!-- Right Column: Summary and Checkout -->
                <div class="space-y-12">
                    <section class="space-y-6 sticky top-8">
                        <h2 class="text-sm font-black text-indigo-600 uppercase tracking-[0.2em] flex items-center">
                            <span class="w-8 h-px bg-indigo-100 mr-3"></span>
                            Investment Ledger
                        </h2>

                        <div class="bg-white border border-slate-100 rounded-[2.5rem] shadow-xl shadow-slate-200/50 p-8 space-y-6">
                            <div class="space-y-4">
                                <div class="flex justify-between items-center px-2">
                                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Gross Subtotal</span>
                                    <span class="text-sm font-black text-slate-900" x-text="'₹' + calculateSubtotal()"></span>
                                </div>

                                <div class="space-y-1.5 px-2">
                                    <label class="text-[10px] font-black text-indigo-400 uppercase tracking-widest">Discount Received (₹)</label>
                                    <input type="number" step="0.01" th:field="*{discountAmount}" x-model="discount"
                                        class="block w-full px-4 py-2.5 bg-indigo-50/30 border border-indigo-100/50 rounded-xl text-sm font-black text-indigo-600 focus:outline-none text-right">
                                </div>

                                <div class="space-y-1.5 px-2">
                                    <label class="text-[10px] font-black text-emerald-400 uppercase tracking-widest">Input Tax / GST (₹)</label>
                                    <input type="number" step="0.01" th:field="*{gstAmount}" x-model="gst"
                                        class="block w-full px-4 py-2.5 bg-emerald-50/30 border border-emerald-100/50 rounded-xl text-sm font-black text-emerald-600 focus:outline-none text-right">
                                </div>
                            </div>

                            <div class="pt-6 border-t border-slate-100">
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest text-center mb-1">Final Investment Total</p>
                                <div class="text-4xl font-black text-slate-900 text-center tracking-tighter" x-text="'₹' + calculateFinalTotal()"></div>
                            </div>

                            <button type="submit" :disabled="items.length === 0"
                                class="w-full py-5 bg-gradient-to-r from-indigo-600 to-indigo-700 text-white rounded-3xl text-sm font-black shadow-xl shadow-indigo-100 hover:scale-[1.02] active:scale-[0.98] transition-all uppercase tracking-widest disabled:opacity-50 disabled:grayscale">
                                Finalize Order
                            </button>

                            <div th:if="${errorMessage}" class="p-4 bg-rose-50 border border-rose-100 rounded-2xl flex items-center text-rose-700 no-print">
                                <svg class="w-4 h-4 mr-2" fill="currentColor" viewBox="0 0 20 20">
                                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"></path>
                                </svg>
                                <p class="text-[10px] font-bold uppercase tracking-widest" th:text="${errorMessage}"></p>
                            </div>
                        </div>
                    </section>
                </div>
            </div>
        </form>

        <script>
            function purchaseForm() {
                return {
                    items: [
                        { productId: '', quantity: 1, price: 0.00, searchQuery: '', searchResults: [], showResults: false, binId: '', batchNumber: '', expiryDate: '' }
                    ],
                    discount: 0.00,
                    gst: 0.00,
                    addItem() {
                        this.items.push({ productId: '', quantity: 1, price: 0.00, searchQuery: '', searchResults: [], showResults: false, binId: '', batchNumber: '', expiryDate: '' });
                    },
                    removeItem(index) {
                        this.items.splice(index, 1);
                    },
                    async searchProducts(index) {
                        const query = this.items[index].searchQuery;
                        if (query.length < 2) {
                            this.items[index].searchResults = [];
                            this.items[index].showResults = false;
                            return;
                        }
                        try {
                            const response = await fetch('/products/api/search?keyword=' + encodeURIComponent(query));
                            const data = await response.json();
                            this.items[index].searchResults = data;
                            this.items[index].showResults = true;
                        } catch(e) { console.error('fetch error', e); }
                    },
                    selectProduct(index, prod) {
                        this.items[index].productId = prod.id;
                        this.items[index].searchQuery = prod.productName;
                        this.items[index].price = prod.purchasePrice || 0;
                        this.items[index].showResults = false;
                    },
                    calculateSubtotal() {
                        let st = 0;
                        this.items.forEach(item => {
                            const q = parseFloat(item.quantity) || 0;
                            const p = parseFloat(item.price) || 0;
                            st += (q * p);
                        });
                        return st.toFixed(2);
                    },
                    calculateFinalTotal() {
                        const subtotal = parseFloat(this.calculateSubtotal()) || 0;
                        const d = parseFloat(this.discount) || 0;
                        const g = parseFloat(this.gst) || 0;
                        return (Math.max(0, subtotal - d) + g).toFixed(2);
                    }
                }
            }
        </script>
    </div>
</body>

</html>
