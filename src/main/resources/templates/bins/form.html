<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout :: layout(pageTitle='New Bin', content=~{this :: #main-content})}">

<body>
    <div id="main-content" class="space-y-8 max-w-3xl mx-auto">
        <div>
            <h1 class="text-3xl font-black text-slate-900 tracking-tight" th:text="${bin.id != null ? 'Edit Bin' : 'New Bin'}">Bin</h1>
        </div>

        <form th:action="@{/bins/save(zoneId=${zoneId})}" th:object="${bin}" method="post" class="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm space-y-6">
            <input type="hidden" th:field="*{id}">
            
            <div class="space-y-1.5">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Bin Name/Identifier *</label>
                <input type="text" th:field="*{name}" required class="block w-full px-5 py-3.5 bg-slate-50/50 border border-slate-200 rounded-2xl text-sm font-semibold text-slate-900 focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all outline-none" placeholder="e.g. A-01-01">
                <p class="text-xs text-slate-400 ml-1 mt-1">Try to use a logical format: Row-Shelf-Bin</p>
            </div>

            <div class="space-y-1.5 border-t border-dashed border-slate-200 pt-6 mt-6">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 flex items-center gap-2">
                    <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm14 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path></svg>
                    Barcode / QR Scanner ID *
                </label>
                <div class="flex gap-4">
                    <input type="text" th:field="*{barcode}" required class="block w-full px-5 py-3.5 bg-slate-50/50 border border-slate-200 rounded-2xl font-mono text-sm font-bold text-slate-900 focus:outline-none focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 transition-all outline-none" placeholder="Scan or enter barcode">
                    <!-- A neat trick for a warehouse app would be a 'generate randomly' button, but we'll leave it simple for now -->
                </div>
            </div>

            <div class="pt-6 border-t border-slate-100 flex justify-end gap-4">
                <a th:href="@{/zones/{id}(id=${zoneId})}" class="px-6 py-3 bg-slate-100 text-slate-600 rounded-2xl text-sm font-black uppercase tracking-widest hover:bg-slate-200 transition-all">Cancel</a>
                <button type="submit" class="px-6 py-3 bg-emerald-600 text-white rounded-2xl text-sm font-black uppercase tracking-widest hover:bg-emerald-700 transition-all shadow-lg shadow-emerald-200">Save Bin</button>
            </div>
        </form>
    </div>
</body>
</html>
