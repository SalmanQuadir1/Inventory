<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
    th:fragment="layout(pageTitle, content)">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${(pageTitle ?: 'Home') + ' - FGH'}">FGH- Inventory Management</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
        }

        [x-cloak] {
            display: none !important;
        }

        .glass-sidebar {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        .nav-link-active {
            background: linear-gradient(135deg, #4F46E5 0%, #4338CA 100%);
            color: white;
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3);
        }

        .content-card {
            background: white;
            border-radius: 1.5rem;
            border: 1px solid #f1f5f9;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .content-card:hover {
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #cbd5e1;
        }

        @media print {
            .no-print {
                display: none !important;
            }

            .print-only {
                display: block !important;
            }

            body {
                background: white !important;
                padding: 0 !important;
            }

            .main-content {
                padding: 0 !important;
                margin: 0 !important;
                width: 100% !important;
            }
        }
    </style>
</head>

<body class="leading-normal tracking-tight text-slate-700">

    <div class="flex h-screen overflow-hidden" x-data="{ sidebarOpen: false }">

        <!-- Sidebar -->
        <aside
            class="flex flex-col w-72 h-screen px-6 py-10 overflow-y-auto glass-sidebar z-30 no-print transition-all duration-300 transform"
            :class="{'translate-x-0': sidebarOpen, '-translate-x-full md:translate-x-0': !sidebarOpen}">

            <!-- Brand -->
            <div class="flex items-center space-x-3 mb-12 px-2">
                <div
                    class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-900/20 rotate-3 transform hover:rotate-0 transition-all">
                    <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 9l9-6 9 6v12a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 22V12h6v10"></path>
                    </svg>
                </div>
                <div>
                    <h2 class="text-xl font-extrabold text-white tracking-tight leading-none">FGH Store</h2>
                    <span class="text-[10px] font-bold text-indigo-400 uppercase tracking-[0.2em]">Inventory Pro</span>
                </div>
            </div>

            <!-- Nav -->
            <div class="flex flex-col justify-between flex-1" x-data="{ currentPath: window.location.pathname }">
                <nav class="space-y-1.5">
                    <p class="px-3 text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-4">Main
                        Navigation</p>

                    <a th:href="@{/dashboard}"
                        :class="(currentPath.startsWith('/dashboard') || currentPath === '/') ? 'nav-link-active' : 'text-slate-400 hover:text-white hover:bg-slate-800/50'"
                        class="flex items-center px-4 py-3.5 rounded-2xl transition-all duration-200 group">
                        <svg class="w-5 h-5 mr-3 group-hover:scale-110 transition-transform" fill="none"
                            stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6">
                            </path>
                        </svg>
                        <span class="font-bold text-sm">Dashboard</span>
                    </a>

                    <a sec:authorize="hasAnyRole('ADMIN', 'PHARMACIST', 'STAFF')" th:href="@{/customers}"
                        :class="currentPath.startsWith('/customers') ? 'nav-link-active' : 'text-slate-400 hover:text-white hover:bg-slate-800/50'"
                        class="flex items-center px-4 py-3.5 rounded-2xl transition-all duration-200 group">
                        <svg class="w-5 h-5 mr-3 group-hover:scale-110 transition-transform" fill="none"
                            stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                        </svg>
                        <span class="font-bold text-sm">Customers & Khata</span>
                    </a>

                    <a sec:authorize="hasAnyRole('ADMIN', 'PHARMACIST', 'STAFF')" th:href="@{/products}"
                        :class="currentPath.startsWith('/products') ? 'nav-link-active' : 'text-slate-400 hover:text-white hover:bg-slate-800/50'"
                        class="flex items-center px-4 py-3.5 rounded-2xl transition-all duration-200 group">
                        <svg class="w-5 h-5 mr-3 group-hover:scale-110 transition-transform" fill="none"
                            stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4">
                            </path>
                        </svg>
                        <span class="font-bold text-sm">Products</span>
                    </a>

                    <a sec:authorize="hasAnyRole('ADMIN', 'PHARMACIST', 'STAFF')" th:href="@{/warehouses}"
                        :class="currentPath.startsWith('/warehouses') ? 'nav-link-active' : 'text-slate-400 hover:text-white hover:bg-slate-800/50'"
                        class="flex items-center px-4 py-3.5 rounded-2xl transition-all duration-200 group">
                        <svg class="w-5 h-5 mr-3 group-hover:scale-110 transition-transform" fill="none"
                            stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4">
                            </path>
                        </svg>
                        <span class="font-bold text-sm">Warehouses</span>
                    </a>

                    <a sec:authorize="hasAnyRole('ADMIN', 'PHARMACIST')" th:href="@{/suppliers}"
                        :class="currentPath.startsWith('/suppliers') ? 'nav-link-active' : 'text-slate-400 hover:text-white hover:bg-slate-800/50'"
                        class="flex items-center px-4 py-3.5 rounded-2xl transition-all duration-200 group">
                        <svg class="w-5 h-5 mr-3 group-hover:scale-110 transition-transform" fill="none"
                            stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z">
                            </path>
                        </svg>
                        <span class="font-bold text-sm">Suppliers</span>
                    </a>

                    <a sec:authorize="hasAnyRole('ADMIN', 'PHARMACIST')" th:href="@{/purchases}"
                        :class="currentPath.startsWith('/purchases') ? 'nav-link-active' : 'text-slate-400 hover:text-white hover:bg-slate-800/50'"
                        class="flex items-center px-4 py-3.5 rounded-2xl transition-all duration-200 group">
                        <svg class="w-5 h-5 mr-3 group-hover:scale-110 transition-transform" fill="none"
                            stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9 17a2 2 0 11-4 0 2 2 0 014 0zM19 17a2 2 0 11-4 0 2 2 0 014 0z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M13 16V6a1 1 0 00-1-1H4a1 1 0 00-1-1v10a1 1 0 001 1h1m8-1a1 1 0 01-1 1H9m4-1V8a1 1 0 011-1h2.586a1 1 0 01.707.293l3.414 3.414a1 1 0 01.293.707V16a1 1 0 01-1 1h-1m-6-1a1 1 0 001 1h1M5 17a2 2 0 104 0m-4 0a2 2 0 114 0m6 0a2 2 0 104 0m-4 0a2 2 0 114 0">
                            </path>
                        </svg>
                        <span class="font-bold text-sm">Stock In</span>
                    </a>

                    <a sec:authorize="hasAnyRole('ADMIN', 'PHARMACIST', 'STAFF')" th:href="@{/sales}"
                        :class="currentPath.startsWith('/sales') ? 'nav-link-active' : 'text-slate-400 hover:text-white hover:bg-slate-800/50'"
                        class="flex items-center px-4 py-3.5 rounded-2xl transition-all duration-200 group">
                        <svg class="w-5 h-5 mr-3 group-hover:scale-110 transition-transform" fill="none"
                            stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z">
                            </path>
                        </svg>
                        <span class="font-bold text-sm">POS Billing</span>
                    </a>

                    <a sec:authorize="hasAnyRole('ADMIN', 'PHARMACIST')" th:href="@{/reports}"
                        :class="currentPath.startsWith('/reports') ? 'nav-link-active' : 'text-slate-400 hover:text-white hover:bg-slate-800/50'"
                        class="flex items-center px-4 py-3.5 rounded-2xl transition-all duration-200 group">
                        <svg class="w-5 h-5 mr-3 group-hover:scale-110 transition-transform" fill="none"
                            stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z">
                            </path>
                        </svg>
                        <span class="font-bold text-sm">Reports</span>
                    </a>

                    <p sec:authorize="hasAnyRole('ADMIN', 'MANAGER')"
                        class="px-3 text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mt-8 mb-4">
                        Management Intelligence</p>
                    <a sec:authorize="hasAnyRole('ADMIN', 'MANAGER')" th:href="@{/management/dashboard}"
                        :class="currentPath.startsWith('/management') ? 'nav-link-active' : 'text-slate-400 hover:text-white hover:bg-slate-800/50'"
                        class="flex items-center px-4 py-3.5 rounded-2xl transition-all duration-200 group">
                        <svg class="w-5 h-5 mr-3 group-hover:scale-110 transition-transform" fill="none"
                            stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z">
                            </path>
                        </svg>
                        <span class="font-bold text-sm">Growth & Profits</span>
                    </a>

                    <p sec:authorize="hasRole('ADMIN')"
                        class="px-3 text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mt-8 mb-4">
                        Administration</p>
                    <a sec:authorize="hasRole('ADMIN')" th:href="@{/users}"
                        :class="currentPath.startsWith('/users') ? 'nav-link-active' : 'text-slate-400 hover:text-white hover:bg-slate-800/50'"
                        class="flex items-center px-4 py-3.5 rounded-2xl transition-all duration-200 group">
                        <svg class="w-5 h-5 mr-3 group-hover:scale-110 transition-transform" fill="none"
                            stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z">
                            </path>
                        </svg>
                        <span class="font-bold text-sm">Staff Management</span>
                    </a>
                </nav>

                <!-- Logout Link -->
                <div class="mt-auto border-t border-slate-800 pt-6">
                    <form th:action="@{/logout}" method="post">
                        <button type="submit"
                            class="flex items-center px-4 py-3 rounded-2xl text-red-400 hover:text-white hover:bg-red-500/10 transition-all duration-200 w-full font-bold text-sm">
                            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M17 16l4-4m0 0l-4-4m4-4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1">
                                </path>
                            </svg>
                            Logout
                        </button>
                    </form>
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <div class="flex flex-col flex-1 w-full overflow-hidden bg-slate-50/50">
            <!-- Modern Header -->
            <header
                class="flex items-center justify-between px-8 py-5 bg-white/80 backdrop-blur-md border-b border-slate-100 z-20 no-print">
                <div class="flex items-center">
                    <button @click="sidebarOpen = !sidebarOpen"
                        class="text-slate-500 focus:outline-none md:hidden hover:bg-slate-100 p-2 rounded-xl transition-colors">
                        <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M4 6H20M4 12H20M4 18H11" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                    </button>
                    <div class="hidden md:flex flex-col ml-4">
                        <p class="text-xs font-black text-slate-400 uppercase tracking-widest leading-none mb-1">
                            FGH Store
                            Enterprise</p>
                        <p class="text-[10px] text-slate-500 font-medium"
                            th:text="${#temporals.format(#temporals.createNow(), 'EEEE, dd MMMM yyyy')}"></p>
                    </div>
                </div>

                <div class="flex items-center space-x-4">
                    <div class="flex flex-col text-right">
                        <p class="text-xs font-black text-slate-400 uppercase tracking-widest leading-none mb-1">Account
                        </p>
                        <p class="text-sm font-extrabold text-slate-900" sec:authentication="name"></p>
                    </div>
                    <div
                        class="w-10 h-10 bg-indigo-50 border border-indigo-100 rounded-xl flex items-center justify-center text-indigo-600 font-black">
                        <span th:text="${#strings.substring(#authentication.name,0,1).toUpperCase()}">U</span>
                    </div>
                </div>
            </header>

            <!-- Dynamic Main Section -->
            <main class="flex-1 overflow-x-hidden overflow-y-auto custom-scrollbar p-8">
                <div class="max-w-[1400px] mx-auto">
                    <!-- Notifications/Alerts -->
                    <div th:if="${successMessage}" x-data="{ show: true }" x-show="show" x-transition.duration.500ms
                        class="mb-8 p-4 bg-emerald-50 border border-emerald-100 rounded-2xl flex items-center justify-between shadow-sm">
                        <div class="flex items-center text-emerald-700">
                            <div
                                class="w-8 h-8 bg-emerald-500 rounded-lg flex items-center justify-center mr-3 shadow-md shadow-emerald-200">
                                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3"
                                        d="M5 13l4 4L19 7"></path>
                                </svg>
                            </div>
                            <p class="font-bold text-sm tracking-tight" th:text="${successMessage}"></p>
                        </div>
                        <button @click="show = false"
                            class="text-emerald-400 hover:text-emerald-600 transition-colors"><svg class="w-5 h-5"
                                fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M6 18L18 6M6 6l12 12"></path>
                            </svg></button>
                    </div>

                    <div th:if="${errorMessage}" x-data="{ show: true }" x-show="show" x-transition.duration.500ms
                        class="mb-8 p-4 bg-rose-50 border border-rose-100 rounded-2xl flex items-center justify-between shadow-sm">
                        <div class="flex items-center text-rose-700">
                            <div
                                class="w-8 h-8 bg-rose-500 rounded-lg flex items-center justify-center mr-3 shadow-md shadow-rose-200">
                                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3"
                                        d="M6 18L18 6M6 6l12 12"></path>
                                </svg>
                            </div>
                            <p class="font-bold text-sm tracking-tight" th:text="${errorMessage}"></p>
                        </div>
                        <button @click="show = false" class="text-rose-400 hover:text-rose-600 transition-colors"><svg
                                class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M6 18L18 6M6 6l12 12"></path>
                            </svg></button>
                    </div>

                    <!-- Main Fragment Content -->
                    <div class="content-card p-10">
                        <div th:replace="${content}"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>
</body>

</html>
