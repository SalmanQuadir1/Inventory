<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout :: layout(pageTitle='Customer Management', content=~{this :: #main-content})}">

<body>
    <div id="main-content" class="min-h-screen pb-12 pt-6 max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
        
        <div class="mb-8">
            <a th:href="@{/customers}" class="inline-flex items-center text-sm font-bold text-slate-500 hover:text-indigo-600 transition-colors mb-4 group">
                <svg class="mr-2 h-4 w-4 transform group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Back to Ledger
            </a>
            <h1 class="text-3xl font-black tracking-tight text-slate-900 sm:text-4xl" th:text="${customerDto.id == null ? 'Register Customer' : 'Edit Customer Profile'}"></h1>
        </div>

        <form th:action="@{/customers/save}" th:object="${customerDto}" method="post" class="bg-white shadow-xl shadow-slate-200/40 rounded-3xl border border-slate-200 overflow-hidden relative z-0">
            
            <div th:if="${errorMessage}" class="p-6 bg-rose-50 border-b border-rose-100 flex items-center">
                <svg class="h-5 w-5 text-rose-500 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <p class="text-sm font-bold text-rose-800" th:text="${errorMessage}"></p>
            </div>

            <div th:if="${#fields.hasErrors('*')}" class="p-6 bg-rose-50 border-b border-rose-100">
                <p class="font-black text-[10px] text-rose-700 uppercase tracking-widest mb-2">Please fix the following validation errors:</p>
                <ul class="text-xs font-bold text-rose-600 list-disc ml-4 space-y-1">
                    <li th:each="err : ${#fields.allErrors()}" th:text="${err}"></li>
                </ul>
            </div>

            <div class="p-6 sm:p-8 space-y-8">
                <input type="hidden" th:field="*{id}" />

                <div class="grid grid-cols-1 gap-y-6 gap-x-8 sm:grid-cols-2">
                    <div class="sm:col-span-2">
                        <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2">Customer Name</label>
                        <input type="text" th:field="*{name}" class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-semibold text-slate-900 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all outline-none" placeholder="E.g. John Doe">
                    </div>

                    <div>
                        <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2">Phone Number</label>
                        <input type="text" th:field="*{phone}" class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-semibold text-slate-900 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all outline-none" placeholder="+91 9876543210">
                    </div>

                    <div>
                        <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2">Email Address</label>
                        <input type="email" th:field="*{email}" class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-semibold text-slate-900 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all outline-none" placeholder="john@example.com">
                    </div>

                    <div class="sm:col-span-2">
                        <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2">Billing Address</label>
                        <textarea th:field="*{address}" rows="3" class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-semibold text-slate-900 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all outline-none" placeholder="123 Main St, City..."></textarea>
                    </div>
                </div>
            </div>

            <div class="px-6 py-5 bg-slate-50 border-t border-slate-100 flex items-center justify-end space-x-4">
                <a th:href="@{/customers}" class="px-6 py-2.5 border border-slate-200 text-sm font-bold rounded-xl text-slate-600 bg-white hover:bg-slate-50 transition-colors">Cancel</a>
                <button type="submit" class="px-6 py-2.5 border border-transparent text-sm font-bold rounded-xl text-white bg-indigo-600 hover:bg-indigo-700 shadow-lg shadow-indigo-600/20 active:scale-95 transition-all">Save Customer</button>
            </div>
        </form>
    </div>
</body>
</html>
