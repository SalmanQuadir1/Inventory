server.port=8080
spring.main.allow-bean-definition-overriding=true

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/inventory?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
# Replace these with your local MySQL credentials:
spring.datasource.username=root
spring.datasource.password=root

# Hibernate Properties
# Use target dialect
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# The SQL dialect makes Hibernate generate better SQL for the chosen database
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Hibernate ddl auto (create, create-drop, validate, update)
spring.jpa.hibernate.ddl-auto=update

# Show/Format SQL
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.org.hibernate.stat=DEBUG

# Initial Data Load (Optional)
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Session Configuration
server.servlet.session.timeout=1d

# Upload Limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Temporary debugging
logging.file.name=pos_error.log

# SMS Gateway Configuration
# Set sms.enabled=true and provide apiUrl/apiKey to enable real SMS delivery
sms.enabled=false
sms.api.url=https://www.fast2sms.com/dev/bulkV2
sms.api.key=YOUR_API_KEY_HERE
sms.sender.id=FGHSTR
